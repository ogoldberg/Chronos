name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        timeout-minutes: 5
      - run: npm run typecheck
        timeout-minutes: 3
      - run: npm run build
        timeout-minutes: 5
      - run: npm test
        timeout-minutes: 3
