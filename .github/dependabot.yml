version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      react:
        patterns: ["react", "react-dom", "@types/react*"]
      ai-sdks:
        patterns: ["@anthropic-ai/*", "openai", "@google/generative-ai"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
