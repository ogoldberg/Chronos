<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CHRONOS — Timeline of Existence</title>
    <meta name="description" content="An open-source infinite zoomable timeline from the Big Bang to today. Wikidata-backed event discovery, knowledge-graph visualization, and zero-trust BYOK AI: keys never leave your browser." />
    <meta name="theme-color" content="#0a0e1a" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="canonical" href="https://chronosapp.org/" />

    <!-- Open Graph (Facebook, LinkedIn, most link previewers) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Chronos" />
    <meta property="og:title" content="Chronos — Timeline of Existence" />
    <meta property="og:description" content="An open-source infinite zoomable timeline from the Big Bang to today. Wikidata-backed event discovery, knowledge-graph visualization, and zero-trust BYOK AI — your key, your browser, no server in the AI path." />
    <meta property="og:url" content="https://chronosapp.org/" />
    <meta property="og:image" content="https://chronosapp.org/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Chronos — Timeline of Existence. An open-source infinite zoomable timeline from the Big Bang to today." />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Chronos — Timeline of Existence" />
    <meta name="twitter:description" content="Open-source zoomable timeline from the Big Bang to today. Wikidata-backed, with zero-trust BYOK AI." />
    <meta name="twitter:image" content="https://chronosapp.org/og-image.png" />
    <!--
      Editorial typography stack:
      - Fraunces: high-contrast variable serif used for display type,
        timeline era markers, and the Chronos wordmark
      - Instrument Sans: humanist sans for UI/body text
      - JetBrains Mono: mono for years, coordinates, ruler ticks, cmdk shortcut hints
      We preconnect to both Google Fonts origins and preload only the critical
      weights so the first paint doesn't flash in the default system font.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
