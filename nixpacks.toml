# Skip `tsc -b` in the Railway build — Vite compiles TS via esbuild
# natively, and tsc adds 30-60s of silent work that has triggered
# Railway's inactivity kill on the Dockerfile path. Type checking
# stays in CI (.github/workflows/ci.yml) where it belongs.

[phases.build]
cmds = ["npx vite build"]

[start]
cmd = "npm start"
